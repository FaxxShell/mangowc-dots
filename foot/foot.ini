# ~/.config/foot/foot.ini

[main]
font=CaskaydiaCove Nerd Font:size=8.9
pad=15x10x0x0

[cursor]
style=block
# This makes it blink!
blink=yes
# If you prefer a beam (like Ghostty), change 'style=block' to 'style=beam'

[colors-dark]
alpha=0.9
background=242124
foreground=cdd6f4

# FORMAT: <cursor-hex> <text-hex>
# This makes the cursor a bright Peach (Rosewater) and the letter under it Dark.
cursor=f5e0dc 1e1e2e

# Catppuccin Mocha Palette
regular0=43465a
regular1=f4403e
regular2=a6e3a1
regular3=f9e2af
regular4=87b0f9
regular5=a53ef2
regular6=94e2d5
regular7=cdd6f4

bright0=43465a
bright1=f4403e
bright2=a6e3a1
bright3=f9e2af
bright4=87b0f9
bright5=a53ef2
bright6=94e2d5
bright7=a1a8c9

selection-foreground=1e1e2e
selection-background=f5e0dc
