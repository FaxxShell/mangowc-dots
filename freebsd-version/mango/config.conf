# --- Appearance (MangoWC Syntax) ---
borderpx=2
gappih=5
gappiv=5
gappoh=20
gappov=20
border_radius=10
no_radius_when_single=0

# Colors (ARGB Format)
bordercolor=0xffffff44
focuscolor=0xffffffff

# --- Animations ---
animations=1
animation_type_open=zoom
zoom_initial_ratio=0.87
animation_duration_open=400

# --- Window Rules ---
# Updated for kitty (FreeBSD appid/class is usually 'kitty')
windowrule=isfloating:1,appid:kitty
windowrule=iscenter:1,appid:kitty
windowrule=width:800,appid:kitty
windowrule=height:450,appid:kitty

# T480s internal display config
monitorrule=name:eDP-1,width:1920,height:1080,refresh:60,x:0,y:0

# --- Hardware Keys (PulseAudio & Backlight) ---
bind=NONE,code:123,spawn,pactl set-sink-mute @DEFAULT_SINK@ 0 && pactl set-sink-volume @DEFAULT_SINK@ +5%
bind=NONE,code:122,spawn,pactl set-sink-mute @DEFAULT_SINK@ 0 && pactl set-sink-volume @DEFAULT_SINK@ -5%
bind=NONE,code:121,spawn,pactl set-sink-mute @DEFAULT_SINK@ toggle

# Brightness on T480s
bind=0,XF86MonBrightnessUp,spawn,backlight +10
bind=0,XF86MonBrightnessDown,spawn,backlight -10

# --- Key Bindings ---
# Using kitty now with your preferred sizing
bind=SUPER,T,spawn,kitty --override initial_window_width=120c --override initial_window_height=32c
bind=SUPER,E,spawn,dolphin
bind=SUPER,A,spawn,wofi --show drun
bind=SUPER,W,spawn,/usr/home/faxxshell/Downloads/zen/zen
bind=SUPER,D,spawn,vesktop

# Session & Window
bind=SUPER,Q,killclient
bind=SUPER,M,quit
bind=SUPER,V,togglefloating

# Focus
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# --- Tags (Workspaces) ---
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

# Mouse Binds
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
cursor_size=24
cursor_theme=Adwaita

# --- Autostart ---
exec-once=waybar -c /usr/home/faxxshell/.config/waybar-mango/config -s /usr/home/faxxshell/.config/waybar-mango/style.css
exec-once=swaync
exec-once=rfkill unblock all
exec-once=swaybg -i /usr/home/faxxshell/Downloads/bg.jpg
exec-once=pulseaudio --start
exec-once=/usr/local/libexec/polkit-mate-authentication-agent-1
exec-once=mullvad-vpn

# --- Input Settings ---
input {
    natural_scroll=1
    tap_to_click=1
    pointer_accel=0
}
